services:
  - type: web
    name: ahp-backend
    env: python
    rootDir: backend           # ✅ Ajout important
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ahp-db
          property: connectionString

  - type: web
    name: ahp-frontend
    env: docker
    rootDir: frontend          # ✅ Ajout important
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://ahp-backend.onrender.com/api

databases:
  - name: ahp-db
    databaseName: ahp_db
    user: ahp_user
    plan: free
    region: frankfurt
